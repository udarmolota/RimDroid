name: Build RimDroid APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
    
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "Installing NDK..."
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: rimdroid-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/rimdroid-debug.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease
        env:
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: rimdroid-release-${{ github.sha }}
          path: app/build/outputs/apk/release/rimdroid-release.apk
          retention-days: 30
